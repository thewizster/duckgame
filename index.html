<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Duck Run: Endless</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            box-shadow: 0 0 60px rgba(80, 120, 255, 0.4);
        }

        canvas {
            display: block;
            border: 3px solid #ffffff;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            touch-action: none;
        }

        /* ── HUD overlay ── */
        #hud {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            display: none;
        }

        #hudTopLeft {
            position: absolute;
            top: 8px; left: 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        #hpBarOuter {
            width: 130px;
            height: 13px;
            background: rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 2px;
            overflow: hidden;
        }

        #hpBarInner {
            height: 100%;
            width: 100%;
            background: #2ecc71;
            transition: width 0.12s linear, background 0.2s;
        }

        #burstDisplay {
            color: #ffe066;
            font-size: 13px;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 2px;
            min-height: 16px;
        }

        #upgradeIcons {
            color: #aaddff;
            font-size: 11px;
            text-shadow: 1px 1px 0 #000;
            max-width: 140px;
            line-height: 1.4;
        }

        #hudTopCenter {
            position: absolute;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #distanceDisplay {
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000000, -1px -1px 0 #000;
            letter-spacing: 2px;
        }

        #biomeDisplay {
            color: #cccccc;
            font-size: 11px;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 1px;
            margin-top: 2px;
        }

        #hudTopRight {
            position: absolute;
            top: 8px; right: 10px;
            text-align: right;
        }

        #fishDisplay {
            color: #ffe066;
            font-size: 14px;
            text-shadow: 1px 1px 0 #000;
        }

        #killDisplay {
            color: #ff9999;
            font-size: 12px;
            text-shadow: 1px 1px 0 #000;
            margin-top: 3px;
        }

        /* ── Touch buttons ── */
        #touchControls {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 110px;
            pointer-events: auto;
            display: none;
        }

        .touch-btn {
            position: absolute;
            bottom: 18px;
            width: 140px;
            height: 80px;
            background: rgba(255,255,255,0.13);
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 12px;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        #jumpBtn  { left: 12px; }
        #burstBtn { right: 12px; }

        @media (pointer: coarse) {
            #touchControls { display: block; }
        }
    </style>
</head>

let audioCtx       = null;

function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playTone(freq, type, vol, dur, delay) {
    if (!audioCtx) return;
    delay = delay || 0;
    try {
        const osc  = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + delay);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime + delay);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + delay + dur);
        osc.start(audioCtx.currentTime + delay);
        osc.stop(audioCtx.currentTime + delay + dur + 0.05);
    } catch(e) {}
}

// Note frequency table
const N = {

    C5:523,  D5:587,  E5:659,  F5:698,  G5:784,  A5:880,  B5:988,
    C6:1047, D6:1175, E6:1319,
    Eb4:311, Bb3:233, Bb4:466, Ab3:208, Ab4:415, F3s:185, Eb3:156
};

    // 1: Deep Swamp — A minor pentatonic, eerie
    { seq:[N.A3,N.C4,N.D4,N.E4, N.A3,N.G3,N.E3,N.A3, N.C4,N.E4,N.D4,N.A3, N.G3,N.A3,N.E3,N.C4], tempo:180 },
    // 2: Arctic — C major suspended, cool
    { seq:[N.C4,N.G4,N.C5,N.G4, N.D4,N.G4,N.C5,N.D4, N.E4,N.G4,N.C5,N.E4, N.C4,N.G4,N.D4,N.C4], tempo:160 },
    // 3: Volcanic — diminished, tense

    // 4: Sky Kingdom — major 7th arpeggios, ethereal
    { seq:[N.C5,N.E5,N.G5,N.B4, N.C5,N.G5,N.E5,N.C5, N.D5,N.E5,N.G5,N.C5, N.G4,N.C5,N.E5,N.G5], tempo:130 }
];

function startMusic(biomeIdx) {
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
    if (biomeIdx === currentMusicBiome && isMusicPlaying) return;
    currentMusicBiome = biomeIdx;
    isMusicPlaying    = true;
    musicStep         = 0;
    const entry = BIOME_MUSIC[biomeIdx] || BIOME_MUSIC[0];
    const seq   = entry.seq;
    const tempo = entry.tempo;
    musicInterval = setInterval(function() {
        if (!isMusicPlaying || !audioCtx) return;
        const note = seq[musicStep % seq.length];
        if (note) {
            playTone(note, 'square', 0.07, (tempo / 1000) * 0.75);
            if (musicStep % 4 === 0) playTone(note / 2, 'triangle', 0.05, (tempo / 1000) * 1.4);
        }
        musicStep++;
    }, tempo);
}

function stopMusic() {
    isMusicPlaying = false;
    if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
    currentMusicBiome = -1;
}

// ==================== META-PROGRESSION ====================
const META_KEY = 'duckrun_meta';

function loadMeta() {
    try {
        const raw = localStorage.getItem(META_KEY);
        if (!raw) return { bestDistance:0, totalRuns:0, achievements:[] };
        const m = JSON.parse(raw);
        if (!m.achievements)               m.achievements = [];
        if (typeof m.bestDistance !== 'number') m.bestDistance = 0;
        if (typeof m.totalRuns    !== 'number') m.totalRuns    = 0;
        return m;
    } catch(e) {
        return { bestDistance:0, totalRuns:0, achievements:[] };
    }
}

function saveMeta() {
    try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch(e) {}
}

function hasAchievement(id) {
    return meta.achievements.indexOf(id) !== -1;
}

function unlockAchievement(id) {
    if (hasAchievement(id)) return;
    meta.achievements.push(id);
    saveMeta();
    const def = ACHIEVEMENT_DEFS.filter(function(a){ return a.id === id; })[0];
    if (def) toasts.push({ text:'ACHIEVEMENT: ' + def.name, sub: def.desc, timer:220 });
}

function randBetween(a, b) { return a + Math.random() * (b - a); }
function randInt(a, b)     { return Math.floor(randBetween(a, b + 1)); }

function shuffleArray(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
}

function wrapText(c, text, cx, y, maxW, lineH) {
    const words = text.split(' ');
    let line = '';
    for (let i = 0; i < words.length; i++) {
        const test = line + words[i] + ' ';
        if (c.measureText(test).width > maxW && line !== '') {
            c.fillText(line.trim(), cx, y);
            line = words[i] + ' ';
            y += lineH;
        } else { line = test; }
    }
    if (line.trim()) c.fillText(line.trim(), cx, y);
}

function formatTime(ms) {
    const s = Math.floor(ms / 1000);
    return Math.floor(s/60) + ':' + (s%60 < 10 ? '0' : '') + (s%60);
}
