    ctx.fillStyle = 'rgba(150,80,200,0.50)';
    ctx.fillRect(x+7, y+4, 8, 4);
}

function _drawRaccoon(sx, e) {
    var x = sx, y = e.y;
    ctx.save();
    if (e.dir < 0) { ctx.translate(sx + e.w, 0); ctx.scale(-1,1); x = 0; }
    ctx.fillStyle = '#888888';
    ctx.fillRect(x+4, y+10, 20, 18);              // body
    ctx.fillRect(x+14, y, 12, 14);                // head
    ctx.fillStyle = '#555555';                    // tail
    ctx.fillRect(x, y+16, 6, 12);
    ctx.fillStyle = '#cccccc';
    for (var rb=0;rb<3;rb++) ctx.fillRect(x, y+17+rb*3, 6, 2);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x+14, y+2, 12, 6);               // white face
    ctx.fillStyle = '#000000';                    // mask
    ctx.fillRect(x+15, y+3, 4, 4);
    ctx.fillRect(x+21, y+3, 4, 4);
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(x+21, y+9, 5, 3);               // snout
    ctx.restore();
}

function _drawYeti(sx, e) {
    var x = sx, y = e.y;
    var f = e.animFrame % 2;
    ctx.save();
    if (e.dir < 0) { ctx.translate(sx + e.w, 0); ctx.scale(-1,1); x = 0; }
    ctx.fillStyle = '#e0e8f0';
    ctx.fillRect(x+6, y+14, 28, 22);              // body
    ctx.fillRect(x+10, y, 20, 18);               // head
    // Arms
    if (f === 0) {
        ctx.fillRect(x, y+14, 8, 18);
        ctx.fillRect(x+32, y+14, 8, 18);
    } else {
        ctx.fillRect(x-2, y+10, 8, 18);
        ctx.fillRect(x+34, y+10, 8, 18);
    }
    ctx.fillStyle = '#c8d8e8';                    // shading
    ctx.fillRect(x+8, y+16, 24, 10);
    ctx.fillStyle = '#ee1111';                    // angry eyes
    ctx.fillRect(x+12, y+4, 6, 6);
    ctx.fillRect(x+22, y+4, 6, 6);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x+13, y+5, 3, 3);
    ctx.fillRect(x+23, y+5, 3, 3);
    ctx.fillStyle = '#cccccc';                    // claws
    ctx.fillRect(x, y+30, 4, 4);
    ctx.fillRect(x+4, y+30, 4, 4);
    ctx.fillRect(x+32, y+30, 4, 4);
    ctx.fillRect(x+36, y+30, 4, 4);
    ctx.restore();
}

function _drawEagle(sx, e) {
    var x = sx, y = e.y;
    var f = e.animFrame % 2;
    ctx.fillStyle = '#5a3010';                    // brown body
    ctx.fillRect(x+14, y+4, 16, 12);
    ctx.fillStyle = '#ffffff';                    // white head
    ctx.fillRect(x+26, y, 14, 12);
    ctx.fillStyle = '#ffcc00';                    // yellow beak
    ctx.fillRect(x+38, y+7, 6, 4);
    ctx.fillStyle = '#000000';
    ctx.fillRect(x+30, y+2, 5, 5);               // eye
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x+31, y+3, 2, 2);
    // Wide wings
    ctx.fillStyle = '#3a2008';
    if (f === 0) {
        ctx.fillRect(x, y-2, 14, 10);
        ctx.fillRect(x+30, y-2, 14, 10);
    } else {
        ctx.fillRect(x, y+6, 14, 8);
        ctx.fillRect(x+30, y+6, 14, 8);
    }
    // Tail feathers
    ctx.fillStyle = '#5a3010';
    ctx.fillRect(x+8, y+12, 8, 6);
    ctx.fillStyle = '#ffcc00';                    // talons
    ctx.fillRect(x+14, y+14, 4, 4);
    ctx.fillRect(x+22, y+14, 4, 4);
}

function _drawBoulder(sx, e) {
    var x = sx + e.w/2, y = e.y + e.h/2;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(e.rotation || 0);
    ctx.fillStyle = '#888888';
    ctx.fillRect(-14, -12, 28, 24);
    ctx.fillStyle = '#707070';
    ctx.fillRect(-14, -12, 28, 8);
    ctx.fillStyle = '#aaaaaa';                    // highlights
    ctx.fillRect(-12, -10, 8, 5);
    ctx.fillStyle = '#505050';                    // cracks
    ctx.fillRect(-2, -6, 2, 14);
    ctx.fillRect(-8, 2, 18, 2);
    ctx.restore();
}

function _drawUfo(sx, e) {
    var x = sx, y = e.y;
    // Saucer dish
    ctx.fillStyle = '#8888cc';
    ctx.fillRect(x+8, y+10, 34, 10);
    ctx.fillStyle = '#aaaaee';
    ctx.fillRect(x+4, y+12, 42, 6);              // highlight
    // Dome
    ctx.fillStyle = '#44cc44';
    ctx.fillRect(x+16, y, 18, 14);
    ctx.fillStyle = '#66ee66';
    ctx.fillRect(x+18, y+2, 10, 5);              // dome glass
    // Beam when active
    if (e.beamActive) {
        var alpha = 0.25 + Math.sin(frameCount * 0.3) * 0.15;
        ctx.fillStyle = 'rgba(100,255,100,' + alpha + ')';
        ctx.fillRect(x+20, y+20, 10, ROAD_Y - e.y - 20);
    }
    // Blinking lights
    ctx.fillStyle = frameCount % 20 < 10 ? '#ff4444' : '#ffff44';
    ctx.fillRect(x+8, y+12, 4, 4);
    ctx.fillRect(x+38, y+12, 4, 4);
    // Underside glow
    ctx.fillStyle = 'rgba(100,255,100,0.20)';
    ctx.fillRect(x+4, y+18, 42, 4);
}

function _drawAsteroid(sx, e) {
    var x = sx + e.w/2, y = e.y + e.h/2;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(e.rotation || 0);
    ctx.fillStyle = '#888080';
    // Jagged shape via overlapping rects
    ctx.fillRect(-12, -10, 24, 20);
    ctx.fillRect(-8,  -14, 16, 28);
    ctx.fillRect(-14, -6,  28, 12);
    ctx.fillStyle = '#666060';                    // craters
    ctx.fillRect(-6, -4, 6, 6);
    ctx.fillRect(2, 2, 5, 5);
    ctx.fillStyle = '#aaaaaa';                    // sheen
    ctx.fillRect(-10, -8, 5, 4);
    ctx.restore();
}

function _drawDrone(sx, e) {
    var x = sx, y = e.y;
    var f = e.animFrame % 2;
    ctx.fillStyle = '#333344';
    ctx.fillRect(x+8, y+4, 18, 10);              // body
    ctx.fillStyle = '#222233';
    ctx.fillRect(x+12, y+6, 10, 6);              // detail
    // Rotors
    ctx.fillStyle = '#555566';
    ctx.fillRect(x, y, 10, 4);                   // rear arm
    ctx.fillRect(x+24, y, 10, 4);                // front arm
    ctx.fillStyle = f===0 ? '#aaaacc' : '#8888aa';
    ctx.fillRect(x-4, y-2, 14, 2);              // spinning rotor back
    ctx.fillRect(x+24, y-2, 14, 2);             // spinning rotor front
    // Eye / camera
    ctx.fillStyle = '#ff2222';
    ctx.fillRect(x+25, y+5, 5, 5);
    ctx.fillStyle = '#ff8888';
    ctx.fillRect(x+26, y+6, 2, 2);
    // Exhaust
    if (frameCount % 3 === 0)
        spawnParticle(x+2, y+10, -1-Math.random(), (Math.random()-0.5)*0.5, 6, '#888899', 2);
}

// ==================== COLLECTIBLE GENERATION ====================
function generateCollectibles() {
    while (nextCollectibleX < cameraX + GEN_AHEAD) {
        var roll = Math.random();
        // corn=50%, breadcrumb=25%, fuel_can=15%, heart=10%
        var type;
        if      (roll < 0.50) type = 'corn';
        else if (roll < 0.75) type = 'breadcrumb';
        else if (roll < 0.90) type = 'fuel_can';
        else                  type = 'heart';

        var cy = ROAD_Y - 45 - Math.random() * 60;  // float above road
        collectibles.push({
            type:       type,
            worldX:     nextCollectibleX,
            y:          cy,
            bobOffset:  Math.random() * Math.PI * 2,
            collected:  false
        });
        nextCollectibleX += 150 + Math.random() * 180;
    }
}

// ==================== COLLECTIBLE UPDATE ====================
function updateCollectibles() {
    var magnetRange = activeUpgrades.indexOf('magnet') !== -1 ? 130 : 0;
    for (var i = collectibles.length - 1; i >= 0; i--) {
        var c = collectibles[i];
        if (c.collected)                          { collectibles.splice(i,1); continue; }
        if (c.worldX < cameraX - CULL_BEHIND)    { collectibles.splice(i,1); continue; }

        var cdx  = kart.worldX - c.worldX;
        var cdy  = (kart.y + kart.h/2) - c.y;
        var dist = Math.sqrt(cdx*cdx + cdy*cdy);

        // Magnet pull
        if (magnetRange > 0 && dist < magnetRange && dist > 1) {
            c.worldX += (cdx / dist) * 6;
            c.y      += (cdy / dist) * 6;
        }

        // Pickup radius
        if (dist < 26) {
            c.collected = true;
            spawnCollectFX(c.worldX - cameraX, c.y);
            sfxCollect();
            if      (c.type === 'corn')       { corn++; }
            else if (c.type === 'breadcrumb') { corn += 3; }
            else if (c.type === 'fuel_can')   { kart.boostCharges++; updateHUD(); }
            else if (c.type === 'heart')      { kart.hp = Math.min(kart.maxHp, kart.hp + 30); updateHUD(); }
        }
    }
}

// ==================== COLLECTIBLE DRAWING ====================
function drawCollectibles() {
    for (var i = 0; i < collectibles.length; i++) {
        var c = collectibles[i];
        if (c.collected) continue;
        var sx = c.worldX - cameraX;
        if (sx < -20 || sx > W + 20) continue;
        var cy = c.y + Math.sin(frameCount * 0.09 + c.bobOffset) * 4;

        if (c.type === 'corn') {
            // Corn cob
            ctx.fillStyle = '#228822';            // husk leaves
            ctx.fillRect(sx-2, cy-4, 4, 18);
            ctx.fillRect(sx+8, cy-6, 4, 10);
            ctx.fillStyle = '#ffcc00';            // kernels
            ctx.fillRect(sx, cy, 10, 16);
            ctx.fillStyle = '#ffee44';
            for (var kr=0;kr<3;kr++)
                for (var kc=0;kc<2;kc++)
                    ctx.fillRect(sx+2+kc*5, cy+2+kr*5, 3, 3);
            ctx.fillStyle = '#ccaa00';
            ctx.fillRect(sx, cy, 10, 3);          // top shade

        } else if (c.type === 'breadcrumb') {
            // Golden sparkle cluster
            ctx.fillStyle = '#ddaa44';
            ctx.fillRect(sx-4, cy-4, 8, 8);
            ctx.fillStyle = '#ffee88';
            ctx.fillRect(sx-2, cy-2, 4, 4);
            // Sparkle rays
            ctx.fillStyle = '#ffcc44';
            ctx.fillRect(sx-6, cy, 4, 2);
            ctx.fillRect(sx+4, cy, 4, 2);
            ctx.fillRect(sx, cy-6, 2, 4);
            ctx.fillRect(sx, cy+4, 2, 4);

        } else if (c.type === 'fuel_can') {
            // Red fuel can
            ctx.fillStyle = '#cc2200';
            ctx.fillRect(sx-6, cy-8, 14, 18);
            ctx.fillStyle = '#ee4422';
            ctx.fillRect(sx-4, cy-6, 10, 6);     // top highlight
            ctx.fillStyle = '#881100';
            ctx.fillRect(sx-6, cy+6, 14, 4);     // bottom shade
            ctx.fillStyle = '#ffffff';            // label
            ctx.fillRect(sx-3, cy-2, 8, 6);
            ctx.fillStyle = '#cc2200';
            ctx.fillRect(sx-1, cy-1, 4, 4);      // cap
            ctx.fillStyle = '#888888';            // nozzle
            ctx.fillRect(sx+5, cy-10, 3, 6);

        } else if (c.type === 'heart') {
            // Pixel heart
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(sx-7, cy-7, 5, 8);
            ctx.fillRect(sx+2,  cy-7, 5, 8);
            ctx.fillRect(sx-8, cy-3, 16, 5);
            ctx.fillRect(sx-6, cy+1, 12, 4);
            ctx.fillRect(sx-3, cy+4,  6, 4);
            ctx.fillRect(sx-1, cy+7,  2, 3);
            // Shine
            ctx.fillStyle = '#ff8877';
            ctx.fillRect(sx-5, cy-5, 3, 3);
        }
    }
}

// ==================== BOOTSTRAP ====================
loop();
